# test-egress — LiveKit Egress on EKS
#
# Egress uses Chrome for compositing; if the image fails on arm64 nodes, switch affinity to
# node-pool: ondemand-amd64 (see your Terraform NodePools).
#
# helm upgrade --install lk-egress ./test-egress -n livekit -f values.yaml

replicaCount: 1

image:
  repository: livekit/egress
  pullPolicy: IfNotPresent

egress:
  api_key: "REPLACE_WITH_LIVEKIT_API_KEY"
  api_secret: "REPLACE_WITH_LIVEKIT_API_SECRET"
  ws_url: "ws://livekit-server.livekit.svc.cluster.local:7880"
  log_level: info
  health_port: 8080
  prometheus_port: 9090
  enable_chrome_sandbox: true
  redis:
    address: redis-master.redis.svc.cluster.local:6379
  s3:
    access_key: "REPLACE_ME"
    secret: "REPLACE_ME"
    region: "us-east-1"
    bucket: "REPLACE_ME"

terminationGracePeriodSeconds: 3600

nameOverride: ""
fullnameOverride: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60

nodeSelector: {}

resources: {}

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations:
  sidecar.istio.io/inject: "false"
  linkerd.io/inject: disabled

podSecurityContext: {}

securityContext: {}

tolerations: []

# Prefer stable on-demand x86 if Chrome/egress image requires amd64.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-pool
              operator: In
              values: ["ondemand-amd64"]
