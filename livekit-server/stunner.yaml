---
# ─────────────────────────────────────────────────────────────────────────────
# cert-manager ClusterIssuer — Let's Encrypt production
# Prerequisites:
#   helm install cert-manager jetstack/cert-manager \
#     --namespace cert-manager --create-namespace \
#     --set installCRDs=true
#
# DNS-01 challenge is required here because the TURN port (5349) is
# not 80 or 443, so HTTP-01 validation cannot be used by Let's Encrypt.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: your-email@example.com          # replace — LE sends expiry warnings here
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token-secret
              key: api-token    # replace with your Cloudflare API token

---
# ─────────────────────────────────────────────────────────────────────────────
# Certificate — cert-manager issues and auto-renews this.
# Creates a Secret named stunner-tls-secret in the stunner namespace.
# The Secret type is kubernetes.io/tls and contains exactly:
#   tls.crt → PEM certificate chain (leaf + intermediates)
#   tls.key → PEM private key
#
# STUNner reads tls.crt + tls.key directly from this Secret.
# cert-manager watches expiry and rotates automatically (default: 30d before).
# STUNner operator watches the Secret and reloads the cert without
# restarting the TURN listener when cert-manager rotates it.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: stunner-tls
  namespace: stunner
spec:
  secretName: stunner-tls-secret           # referenced below in certificateRefs
  dnsNames:
    - turn.example.com                     # replace with your TURN domain
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer

---
# ─────────────────────────────────────────────────────────────────────────────
# GatewayClass — STUNner WebRTC ingress controller. 
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: stunner-gatewayclass
spec:
  controllerName: "stunner.l7mp.io/gateway-operator"
  parametersRef:
    group: "stunner.l7mp.io"
    kind: GatewayConfig
    name: stunner-gatewayconfig
    namespace: stunner
  description: "STUNner WebRTC ingress (EKS)"

---
# ─────────────────────────────────────────────────────────────────────────────
# Auth Secret — ephemeral HMAC-SHA1 auth
# type: ephemeral  → selects time-windowed HMAC auth mode
# secret           → shared HMAC-SHA1 key, same value LiveKit uses
#
# Create:
#   kubectl create secret generic stunner-auth-secret \
#     --namespace stunner \
#     --from-literal=type=ephemeral \
#     --from-literal=secret="$(openssl rand -hex 32)" \
#     --dry-run=client -o yaml | kubectl apply -f -
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: stunner-auth-secret
  namespace: stunner
type: Opaque
stringData:
  type: ephemeral
  secret: <your-hmac-secret>              # openssl rand -hex 32

---
# ─────────────────────────────────────────────────────────────────────────────
# GatewayConfig
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: stunner.l7mp.io/v1
kind: GatewayConfig
metadata:
  name: stunner-gatewayconfig
  namespace: stunner
spec:
  logLevel: "all:DEBUG,turn:INFO"
  realm: stunner.l7mp.io
  authRef:
    name: stunner-auth-secret
    namespace: stunner

---
# ─────────────────────────────────────────────────────────────────────────────
# Gateway
#
# Port 3478 TURN-UDP:
#   NLB → plain UDP passthrough → STUNner. No TLS anywhere in path.
#
# Port 5349 TURN-TLS:
#   NLB → plain TCP passthrough → STUNner does TLS handshake with client.
#   The NLB has NO TLS listener, NO ACM cert, NO ssl-cert annotation.
#   It forwards raw TCP bytes. STUNner holds the cert (stunner-tls-secret)
#   and terminates TLS itself.
#
# Ref: https://github.com/l7mp/stunner/blob/main/docs/GATEWAY.md
# "tls.certificateRefs must be a reference to a Kubernetes Secret of
#  type tls or opaque with exactly two keys: tls.crt and tls.key"
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: stunner-gateway
  namespace: stunner
  annotations:
    stunner.l7mp.io/enable-mixed-protocol-lb: "true"
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "instance"
    # No ssl-cert, no ssl-ports — NLB is pure passthrough on both ports.
spec:
  gatewayClassName: stunner-gatewayclass
  listeners:
    - name: udp-listener
      port: 3478
      protocol: TURN-UDP
      allowedRoutes:
        namespaces:
          from: All

    - name: tls-listener
      port: 5349
      protocol: TURN-TLS
      tls:
        mode: Terminate                   # STUNner terminates TLS — not the NLB
        certificateRefs:
          - kind: Secret
            namespace: stunner
            name: stunner-tls-secret      # cert-manager populates this Secret
      allowedRoutes:
        namespaces:
          from: All

---
apiVersion: stunner.l7mp.io/v1
kind: UDPRoute
metadata:
  name: livekit-udp
  namespace: stunner
spec:
  parentRefs:
    - name: stunner-gateway
      sectionName: udp-listener
  rules:
    - backendRefs:
        - name: livekit-server
          namespace: livekit

---
# UDPRoute for the TLS listener.
# Route type is UDPRoute even for TURN-TLS — correct per STUNner API.
# "UDP" refers to the inner WebRTC media datagrams being relayed,
# not the outer TURN transport (which is TLS/TCP here).
apiVersion: stunner.l7mp.io/v1
kind: UDPRoute
metadata:
  name: livekit-tls
  namespace: stunner
spec:
  parentRefs:
    - name: stunner-gateway
      sectionName: tls-listener
  rules:
    - backendRefs:
        - name: livekit-server
          namespace: livekit